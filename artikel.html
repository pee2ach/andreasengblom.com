<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artikel – Andreas Engblom</title>
  <meta name="description" content="">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-color text-stone-800 font-sans font-light text-[18px] leading-[1.65] min-h-screen overflow-x-hidden antialiased">

  <div id="site-header-slot"></div>

  <main>
    <div class="w-full max-w-[1400px] mx-auto px-6 md:px-20">
      <div class="page-content-offset pb-24 md:pb-48">

        <!-- Article content rendered by JS -->
        <div id="article-content"></div>

        <!-- Not-found state, shown if slug is missing or unknown -->
        <div id="article-not-found" class="hidden max-w-2xl mx-auto py-24 text-center">
          <p class="text-[0.6rem] tracking-[0.35em] uppercase text-stone-400 mb-8">Artikel hittades inte</p>
          <a href="/artiklar.html" class="btn btn-standard">← Alla artiklar</a>
        </div>

        <!-- Loading state -->
        <div id="article-loading" class="py-24 text-center">
          <span class="text-[0.6rem] tracking-[0.35em] uppercase text-stone-400">Laddar...</span>
        </div>

      </div>
    </div>
  </main>

  <div id="site-footer-slot"></div>

  <script src="/js/app.js?v=20260418"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const slug       = getParam('slug');
      const content    = document.getElementById('article-content');
      const notFound   = document.getElementById('article-not-found');
      const loading    = document.getElementById('article-loading');

      if (!slug) {
        loading.remove();
        notFound.classList.remove('hidden');
        return;
      }

      try {
        const articles = await fetchArticles();
        const article  = articles.find(a => a.slug === slug);
        loading.remove();

        if (!article) {
          notFound.classList.remove('hidden');
          return;
        }

        renderArticle(article, content);
      } catch (e) {
        loading.innerHTML = '<span class="text-[0.6rem] tracking-[0.35em] uppercase text-stone-400">Kunde inte ladda artikeln.</span>';
      }
    });
  </script>
</body>
</html>
